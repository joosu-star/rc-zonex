<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RC SYSTEM PRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚗 RC ZONE</h1>

<div class="nav">
  <button id="btnInicioVista">Inicio</button>
  <button id="btnClientesVista">Clientes</button>
  <button id="btnHistorialVista">Historial</button>
</div>

<div class="top">
  <button id="btnAbrirCaja">Abrir Caja</button>
  <button id="btnCerrarCaja">Cerrar Caja</button>
  <button id="btnRetiro">Retiro</button>
  <button id="btnDeposito">Depósito</button>
</div>

<h2 id="dinero">💰 $0</h2>

<div class="panel">
  <h3>💲 Precios</h3>
  <button id="btnPrecios">Editar precios</button>
</div>

<div id="inicio" class="vista activo">
  <div id="coches"></div>
</div>

<div id="clientes" class="vista">
  <h2>👥 Clientes</h2>
  <div id="listaClientes"></div>
</div>

<div id="historial" class="vista">
  <h2>📜 Historial</h2>
  <div id="listaHistorial"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="contenido">
    <h3>Iniciar coche</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="tiempo" type="number" placeholder="Minutos">
    <button id="btnIniciar">Iniciar</button>
    <button id="btnTicket">Iniciar + Ticket</button>
    <button id="btnCancelarModal">Cancelar</button>
  </div>
</div>

<!-- TICKET -->
<div id="ticketArea" style="display:none;"></div>

<audio id="alarma" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script src="app.js"></script>
</body>
</html>
